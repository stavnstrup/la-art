{{ if hugo.IsMultilingual }}
  {{ range .Site.Languages }}
    {{ if eq . $.Site.Language }}
      <li class="nav-item dropdown"><a href="#" class="nav-link dropdown-toggle" role="button" data-bs-toggle="dropdown" aria-expanded="false" aria-label="{{ i18n "ariaLanguage" }}{{ .Label }}">{{ .Label | upper }}</a>
    {{ end }}
  {{ end }}
  <ul class="dropdown-menu" aria-labelledby="dropdown-title">
    {{ range $.Translations }}
      <li><a class="dropdown-item" title="{{ .Language.Label }}" href="{{ .Permalink }}" aria-label="{{ i18n "ariaTranslation" }}{{ .Language.Label }}">{{ .Language.Label | upper }}</a></li>
    {{ end }}
  </ul>
  </li>
{{ end }}
